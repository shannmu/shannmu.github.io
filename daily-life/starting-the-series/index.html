<h1>开始记录日常生活</h1>



<p>今天开始给日常生活留一个固定的位置。</p>
<p>目标不是写得完美，而是记录发生了什么、自己感受到了什么，
以及那些很容易消失的小想法。</p>
<h2 id="ri-chang-ji-lu">日常记录</h2>
<ul>
<li>今天发生了什么：</li>
<li>我注意到了什么：</li>
<li>我学到了什么：</li>
</ul>
<h2 id="xiang-fa">想法</h2>
<ul>
<li>一个正在想的问题：</li>
<li>一个值得留下的小想法：</li>
<li>之后可以重新看的事情：</li>
</ul>

<section id="comments">
  <h2>评论</h2>
  
    
  
  <div id="giscus-thread"></div>
  <script>
    (function () {
      const container = document.getElementById('giscus-thread');
      if (!container) {
        return;
      }

      const getTheme = () => {
        const htmlTheme = document.documentElement.getAttribute('data-theme');
        if (htmlTheme === 'dark' || htmlTheme === 'light') {
          return htmlTheme;
        }

        const storedTheme = localStorage.getItem('theme');
        if (storedTheme === 'dark' || storedTheme === 'light') {
          return storedTheme;
        }

        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      };

      const setGiscusTheme = () => {
        const iframe = document.querySelector('iframe.giscus-frame');
        if (!iframe || !iframe.contentWindow) {
          return;
        }

        iframe.contentWindow.postMessage({
          giscus: {
            setConfig: {
              theme: getTheme()
            }
          }
        }, 'https://giscus.app');
      };

      const script = document.createElement('script');
      script.src = 'https://giscus.app/client.js';
      script.setAttribute('data-repo', 'shannmu/shannmu.github.io');
      script.setAttribute('data-repo-id', 'R_kgDOL-msKA');
      script.setAttribute('data-category', 'Announcements');
      script.setAttribute('data-category-id', 'DIC_kwDOL-msKM4C7Lz8');
      script.setAttribute('data-mapping', 'pathname');
      script.setAttribute('data-strict', '0');
      script.setAttribute('data-reactions-enabled', '1');
      script.setAttribute('data-emit-metadata', '0');
      script.setAttribute('data-input-position', 'bottom');
      script.setAttribute('data-theme', getTheme());
      script.setAttribute('data-lang', 'zh-CN');
      script.setAttribute('data-loading', 'lazy');
      script.setAttribute('crossorigin', 'anonymous');
      script.async = true;
      container.appendChild(script);

      new MutationObserver(setGiscusTheme).observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['data-theme']
      });

      new MutationObserver(() => {
        window.setTimeout(setGiscusTheme, 0);
        window.setTimeout(setGiscusTheme, 500);
      }).observe(container, {
        childList: true,
        subtree: true
      });
    })();
  </script>
